version: "3.9"

services:
  app:
    build:
      context: ./docker/app
    container_name: pdf-smart-app
    environment:
      - GEMINI_API_KEY=AIzaSyAp0ksTKBhoYh787arH-J9ouazMdZODU0w
    volumes:
      - ./app/uploads:/app/uploads
      - ./app/outputs:/app/outputs
      - ./app/services:/app/services
      - ./app/templates:/app/templates
      - ./app/static:/app/static
      - ./app/main.py:/app/main.py
      - ./requirements.txt:/app/requirements.txt
    restart: always

  nginx:
    build:
      context: ./docker/nginx
    container_name: pdf-smart-nginx
    ports:
      - "80:80"
    depends_on:
      - app
    restart: always
