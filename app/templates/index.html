{% extends "layout.html" %}

{% block content %}

<h2>Upload PDF</h2>

<form action="/process" method="post" enctype="multipart/form-data">

    <input type="file" name="file" required>

    <br><br>

    <label>Mode:</label>

    <select name="mode">

        <option value="normal">Normal</option>
        <option value="ai">AI</option>

    </select>

    <br><br>

    <button type="submit">Process</button>

</form>

{% endblock %}
